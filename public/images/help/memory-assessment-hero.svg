  <circle cx="905" cy="225" r="42" fill="none" stroke="#c9a84c" stroke-width="7"/>
  <circle cx="905" cy="225" r="18" fill="none" stroke="#c9a84c" stroke-width="5" opacity="0.7"/>
  <circle cx="905" cy="225" r="5" fill="#c9a84c"/>

  <g opacity="0.35" stroke="#f5efdf" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 360 h180"/>
    <path d="M120 320 h120"/>
    <path d="M120 400 h240"/>
