<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Memory assessment illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22315e"/>
      <stop offset="1" stop-color="#101a3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <circle cx="920" cy="250" r="180" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.45"/>
  <circle cx="920" cy="250" r="240" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.25"/>

  <!-- head profile with thought rings -->
