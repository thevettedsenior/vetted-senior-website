<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Medication management illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22315e"/>
      <stop offset="1" stop-color="#101a3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <circle cx="930" cy="250" r="190" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.45"/>

  <!-- blister pack grid -->
  <g>
    <rect x="800" y="140" width="260" height="220" rx="18" fill="none" stroke="#f5efdf" stroke-width="8"/>
    <g fill="#c9a84c" opacity="0.9">
      <circle cx="855" cy="195" r="18"/>
      <circle cx="930" cy="195" r="18"/>
      <circle cx="1005" cy="195" r="18"/>
      <circle cx="855" cy="255" r="18"/>
      <circle cx="1005" cy="255" r="18"/>
      <circle cx="855" cy="315" r="18"/>
      <circle cx="930" cy="315" r="18"/>
    </g>
    <g fill="none" stroke="#f5efdf" stroke-width="4" opacity="0.7">
      <circle cx="930" cy="255" r="18"/>
      <circle cx="1005" cy="315" r="18"/>
    </g>
  </g>

  <g opacity="0.35" stroke="#f5efdf" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 360 h180"/>
    <path d="M120 320 h120"/>
    <path d="M120 400 h240"/>
  </g>
</svg>
