<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Counselling conversation illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22315e"/>
      <stop offset="1" stop-color="#101a3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <circle cx="920" cy="250" r="185" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.4"/>

  <!-- two speech bubbles -->
  <g>
    <rect x="780" y="150" width="170" height="110" rx="24" fill="none" stroke="#f5efdf" stroke-width="9"/>
    <path d="M830 260 l-14 36 l42 -32" fill="#f5efdf"/>
    <rect x="920" y="240" width="170" height="110" rx="24" fill="#c9a84c"/>
    <path d="M1040 350 l14 36 l-42 -32" fill="#c9a84c"/>
    <g stroke="#101a3a" stroke-width="7" stroke-linecap="round">
      <path d="M955 280 h100"/>
      <path d="M955 310 h70"/>
    </g>
    <g stroke="#f5efdf" stroke-width="7" stroke-linecap="round" opacity="0.8">
      <path d="M810 185 h110"/>
      <path d="M810 215 h75"/>
    </g>
  </g>

  <g opacity="0.35" stroke="#f5efdf" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 360 h180"/>
    <path d="M120 320 h120"/>
    <path d="M120 400 h240"/>
  </g>
</svg>
